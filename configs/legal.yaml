task: legal
stack: tfidf_lr

stacks:
  tfidf_lr:
    max_features: 30000
    ngram_range: [1, 2]
    c: 2.0
    class_weight: balanced
  bilstm:
    embedding_dim: 300
    hidden_dim: 128
    dropout: 0.2
    epochs: 6
    batch_size: 64
  bert:
    model_name: distilbert-base-uncased
    max_length: 256
    learning_rate: 0.000015
    batch_size: 32
    epochs: 3

decision:
  optimize_for: recall
  min_recall: 0.9
