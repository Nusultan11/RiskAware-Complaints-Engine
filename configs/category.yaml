task: category
stack: tfidf_lr

stacks:
  tfidf_lr:
    max_features: 50000
    ngram_range: [1, 2]
    c: 4.0
    class_weight: balanced
  bilstm:
    embedding_dim: 300
    hidden_dim: 256
    dropout: 0.2
    epochs: 6
    batch_size: 64
  bert:
    model_name: distilbert-base-uncased
    max_length: 256
    learning_rate: 0.00002
    batch_size: 32
    epochs: 3
